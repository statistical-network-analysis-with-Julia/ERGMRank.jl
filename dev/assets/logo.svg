<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="grad-purple" cx="30%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#b57fe3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9558B2;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="grad-red" cx="30%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#e65c53;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#CB3C33;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="grad-green" cx="30%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#5cb84b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#389826;stop-opacity:1" />
    </radialGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="1" dy="1" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.25"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="offsetblur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow" markerWidth="4" markerHeight="4" refX="4" refY="2" orient="auto">
      <polygon points="0 0, 4 2, 0 4" fill="#4063D8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="8" y="8" width="184" height="184" rx="32" fill="#ffffff" stroke="#e0e0e0" stroke-width="1.5"/>

  <!-- Ranking arrows with rank labels -->
  <g transform="translate(100, 75)" filter="url(#shadow)">
    <!-- Ranking edges with arrows -->
    <line x1="-40" y1="-25" x2="38" y2="-25" stroke="#4063D8" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
    <line x1="40" y1="-20" x2="-2" y2="28" stroke="#4063D8" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
    <line x1="-5" y1="28" x2="-38" y2="-20" stroke="#4063D8" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>

    <!-- Rank labels on edges -->
    <rect x="-5" y="-40" width="14" height="12" rx="3" fill="#4063D8" opacity="0.9"/>
    <text x="2" y="-31" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="9" fill="#ffffff">#1</text>

    <rect x="20" y="2" width="14" height="12" rx="3" fill="#4063D8" opacity="0.7"/>
    <text x="27" y="11" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="9" fill="#ffffff">#2</text>

    <rect x="-30" y="2" width="14" height="12" rx="3" fill="#4063D8" opacity="0.5"/>
    <text x="-23" y="11" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="9" fill="#ffffff">#3</text>

    <!-- Nodes -->
    <circle cx="-45" cy="-25" r="16" fill="url(#grad-purple)" stroke="#ffffff" stroke-width="2"/>
    <circle cx="45" cy="-25" r="16" fill="url(#grad-red)" stroke="#ffffff" stroke-width="2"/>
    <circle cx="0" cy="35" r="16" fill="url(#grad-green)" stroke="#ffffff" stroke-width="2"/>
  </g>

  <!-- Package name -->
  <g transform="translate(100, 155)" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="16" letter-spacing="0.5">
    <text x="-42" y="0" fill="#9558B2">E</text>
    <text x="-30" y="0" fill="#9558B2">R</text>
    <text x="-17" y="0" fill="#9558B2">G</text>
    <text x="-4" y="0" fill="#9558B2">M</text>
    <text x="12" y="0" fill="#CB3C33">R</text>
    <text x="24" y="0" fill="#CB3C33">a</text>
    <text x="34" y="0" fill="#CB3C33">n</text>
    <text x="46" y="0" fill="#CB3C33">k</text>
  </g>
  <text x="100" y="175" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="12" fill="#555555">.jl</text>
</svg>
