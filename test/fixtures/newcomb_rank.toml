name = "newcomb_rank"

[provenance]
r_version = "4.6.1"
ergm_rank_version = "4.1.2"
ergm_version = "4.12.0"
network_version = "1.20.0"
seed = 20260713
script = "test/fixtures/r/newcomb_rank.R"
date = "2026-07-13"
dataset = "ergm.rank::newcomb[[1]] (Newcomb 1961): 17 fraternity men, week 1, each ranking the other 16; GREATER value = HIGHER standing"
model = "newcomb[[1]] ~ rank.deference + rank.nonconformity(\"all\"), response=\"rank\", reference=~CompleteOrder"
r_estimator = "MCMC-MLE (AlterSwap proposal)"
julia_estimator = "swap pseudo-likelihood -- a DIFFERENT estimator, not an approximation to the above; see [tolerance]"
mcmc_control = "control.ergm(MCMC.samplesize=2048, MCMC.burnin=8192, MCMC.interval=512)"
replication_seeds = "101,202,303,404,505"

[tolerance]
# Observed sufficient statistics: a deterministic function of the ranking.
# No estimator, no Monte Carlo. Machine precision, and a disagreement is a
# bug in a term formula, full stop.
summary_statistics = 1e-9
#
# COEFFICIENTS: THERE IS NO HONEST TOLERANCE HERE, AND THAT IS THE FINDING.
#
# ergm.rank fits the MCMC MLE. ERGMRank.jl fits a SWAP PSEUDO-LIKELIHOOD --
# the product of the logistic probabilities of each (ego, alter-pair)
# relative order, multiplied as if independent, which they emphatically are
# not. That is a different estimator, not a noisy version of the same one,
# and ERGMRank.jl's own docs decline to claim consistency for it.
#
# So no tolerance is stated for the coefficients, and the Julia testset marks
# the comparison @test_broken and PRINTS the gap in units of `mle_seed_sd`
# below -- ergm.rank's own Monte-Carlo width, which is the only scale on
# which 'how far apart are they' means anything. Setting a tolerance wide
# enough to turn that green would be a tolerance chosen to hide the result.
#
# `mle_coefficients` in [values] is therefore FROZEN, not ASSERTED. When
# ERGMRank.jl grows a real MCMLE, delete the @test_broken and assert against
# it at a multiple of `mle_seed_sd`, exactly as the ERGM.jl fixture does.

[values]
# --- the ranking, frozen. Julia rebuilds it exactly. --------------------
n_actors = 17
ranks = [[0, 7, 12, 11, 10, 4, 13, 14, 15, 16, 3, 9, 1, 5, 8, 6, 2], [8, 0, 16, 1, 11, 12, 2, 14, 10, 13, 15, 6, 7, 9, 5, 3, 4], [13, 10, 0, 7, 8, 11, 9, 15, 6, 5, 2, 1, 16, 12, 4, 14, 3], [13, 1, 15, 0, 14, 4, 3, 16, 12, 7, 6, 9, 8, 11, 10, 5, 2], [14, 10, 11, 7, 0, 16, 12, 4, 5, 6, 2, 3, 13, 15, 8, 9, 1], [7, 13, 11, 3, 15, 0, 10, 2, 4, 16, 14, 5, 1, 12, 9, 8, 6], [15, 4, 11, 3, 16, 8, 0, 6, 9, 10, 5, 2, 14, 12, 13, 7, 1], [9, 8, 16, 7, 10, 1, 14, 0, 11, 3, 2, 5, 4, 15, 12, 13, 6], [6, 16, 8, 14, 13, 11, 4, 15, 0, 7, 1, 2, 9, 5, 12, 10, 3], [2, 16, 9, 14, 11, 4, 3, 10, 7, 0, 15, 8, 12, 13, 1, 6, 5], [12, 7, 4, 8, 6, 14, 9, 16, 3, 13, 0, 2, 10, 15, 11, 5, 1], [15, 11, 2, 6, 5, 14, 7, 13, 10, 4, 3, 0, 16, 8, 9, 12, 1], [1, 15, 16, 7, 4, 2, 12, 14, 13, 8, 6, 11, 0, 10, 3, 9, 5], [14, 5, 8, 6, 13, 9, 2, 16, 1, 3, 12, 7, 15, 0, 4, 11, 10], [16, 9, 4, 8, 1, 13, 11, 12, 6, 2, 3, 5, 10, 15, 0, 14, 7], [8, 11, 15, 3, 13, 16, 14, 12, 1, 9, 2, 6, 10, 7, 5, 0, 4], [9, 15, 10, 2, 4, 11, 5, 12, 3, 7, 8, 1, 6, 16, 14, 13, 0]]

# --- observed sufficient statistics: deterministic, ASSERTED at 1e-9 ----
summary_statistic_names = ["deference", "nonconformity"]
summary_statistics = [844, 12748]

# --- ergm.rank's MCMC MLE: FROZEN, NOT ASSERTED ------------------------
# ERGMRank.jl does not fit this estimator (see [tolerance]). These are the
# numbers a future MCMLE must reproduce, and the numbers the current swap
# pseudo-likelihood is measured AGAINST rather than held TO.
term_names = ["deference", "nonconformity"]
mle_coefficients = [-0.15310126894401968, -0.0065926521550222729]
mle_std_errors = [0.040448846749775731, 0.0017359074004815738]

# ergm.rank disagreeing with ITSELF over five further seeds. This is the
# Monte-Carlo width of the MLE and the unit the Julia-vs-R gap is reported
# in: a gap of one of these means nothing; a gap of a hundred means the two
# estimators are answering different questions.
mle_seed_sd = [0.00074306491731562817, 5.6148199288267778e-05]
mle_seed_mean = [-0.15310843090263848, -0.0066143465120896564]
